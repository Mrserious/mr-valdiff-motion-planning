_target_: diffusion_policy.workspace.train_nav_diffusion_unet_hybrid_workspace.TrainDiffusionUnetHybridWorkspace
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    # Keep the best checkpoints by validation loss (smaller is better).
    # Requires: task.dataset.val_ratio>0 and training.val_every>0.
    format_str: epoch={epoch:04d}-val_loss={val_loss:.6f}.ckpt
    k: 30
    mode: min
    monitor_key: val_loss
dataloader:
  batch_size: 64
  num_workers: 8
  persistent_workers: false
  pin_memory: true
  shuffle: true
dataset_obs_steps: 2
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0
exp_name: default
horizon: 8
keypoint_visible_rate: 1.0
logging:
  group: null
  id: null
  mode: online
  name: valuewin23ch_train_diffusion_unet_hybrid_nav_image
  project: diffusion_policy_debug
  resume: true
  tags:
  - train_diffusion_unet_hybrid
  - nav_image
  - valuewin23ch
multi_run:
  run_dir: data/outputs/valuewin23ch_train_diffusion_unet_hybrid_nav_image
  wandb_name_base: valuewin23ch_train_diffusion_unet_hybrid_nav_image
n_action_steps: 4
n_latency_steps: 0
n_obs_steps: 2
name: train_diffusion_unet_hybrid
obs_as_global_cond: true
optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06
past_action_visible: false
policy:
  _target_: diffusion_policy.policy.diffusion_unet_hybrid_image_policy.DiffusionUnetHybridImagePolicy
  cond_predict_scale: true
  crop_shape: null
  diffusion_step_embed_dim: 128
  down_dims:
  - 256
  - 512
  - 1024
  eval_fixed_crop: false
  horizon: 8
  kernel_size: 5
  n_action_steps: 4
  n_groups: 8
  n_obs_steps: 2
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    beta_start: 0.0001
    clip_sample: true
    num_train_timesteps: 100
    prediction_type: epsilon
  num_inference_steps: 100
  obs_as_global_cond: true
  obs_encoder_group_norm: true
  shape_meta:
    action:
      shape:
      - 2
    obs:
      agent_pos:
        shape:
        - 3
        type: low_dim
      image:
        shape:
        - 23
        - 84
        - 84
        type: rgb
      global_path:
        shape:
        - 4
        - 3
        type: low_dim
shape_meta:
  action:
    shape:
    - 2
  obs:
    agent_pos:
      shape:
      - 3
      type: low_dim
    image:
      shape:
      - 23
      - 84
      - 84
      type: rgb
    global_path:
      shape:
      - 4
      - 3
      type: low_dim
task:
  dataset:
    _target_: diffusion_policy.dataset.nav_image_dataset.NavImageDataset
    horizon: 8
    # performance optimization: only load the first n_obs_steps for obs keys (img/state/gpath)
    n_obs_steps: ${n_obs_steps}
    max_train_episodes: null
    pad_after: 3
    pad_before: 1
    seed: 42
    val_ratio: 0.10
    # Prompt03 dataset (override on CLI if needed)
    zarr_path: data/zarr/unicycle_simple_car_parking_goal0_mpp0.05_20starts.zarr
  image_shape:
  - 23
  - 84
  - 84
  name: nav_image
  shape_meta:
    action:
      shape:
      - 2
    obs:
      agent_pos:
        shape:
        - 3
        type: low_dim
      image:
        shape:
        - 23
        - 84
        - 84
        type: rgb
      global_path:
        shape:
        - 4
        - 3
        type: low_dim
task_name: nav_image
training:
  # Overwrite checkpoints/latest.ckpt every epoch (for robust resume).
  checkpoint_every: 1
  debug: false
  device: cuda:0
  gradient_accumulate_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_train_steps: null
  max_val_steps: null
  num_epochs: 70
  resume: true
  rollout_every: 50
  # also compute train_action_mse_error on a training batch (sanity metric)
  sample_every: 1
  seed: 42
  tqdm_interval_sec: 1.0
  use_ema: true
  val_every: 1
val_dataloader:
  batch_size: 2048
  num_workers: 8
  persistent_workers: false
  pin_memory: true
  shuffle: false
